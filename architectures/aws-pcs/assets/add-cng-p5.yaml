AWSTemplateFormatVersion: '2010-09-09'
Description: Adding Compute Node Group to PCS Cluster with multi-network interface support for P5 series (On-Demand or Capacity Block)

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Capacity Blocks for ML Settings (Optional)
        Parameters:
          - CapacityReservationId
      - Label:
          default: Additional Compute Node Group Settings
        Parameters:
          - CngName
          - QueueName
          - InstanceType
          - NetworkInterfaceCount
          - MaxCount
          - MinCount
      - Label:
          default: PCS Cluster configuration
        Parameters:
          - ClusterId
          - SubnetId
          - AmiId
          - ClusterSecurityGroupId
          - IamProfileArn
          - FSxLustreFilesystemId
          - FSxLustreFilesystemMountName
          - FSxOpenZFSFilesystemId

Parameters:
  CapacityReservationId:
    Type: String
    Description: (Optional) Capacity Reservation ID for Capacity Blocks. Leave empty for On-Demand instances.
    Default: ""

  ClusterId:
    Type: String
    Description: Cluster ID

  CngName:
    Type: String
    Description: Name for Compute Node Group
    Default: "gpu-p5"

  QueueName:
    Type: String
    Description: Name for Queue (leave empty to skip queue creation)
    Default: ""

  InstanceType:
    Type: String
    Description: Instance Type for Compute Node Group (e.g., p5.48xlarge, p5e.48xlarge, p5en.48xlarge)
    Default: "p5.48xlarge"

  NetworkInterfaceCount:
    Type: String
    Description: Number of network interfaces for P5 instances (16 for p5en.48xlarge, 32 for p5.48xlarge and p5e.48xlarge)
    Default: "32"
    AllowedValues:
      - "16"
      - "32"

  MaxCount:
    Type: Number
    Description: Maximum number of instance

  MinCount:
    Type: Number
    Description: Minimum number of instance. (it must be 0 if you want to use dynamic scaling)

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Select the Subnet where the Compute Node will be launched

  AmiId:
    Type: AWS::EC2::Image::Id
    Description: Enter the AMI ID for the Login Node and Compute Node (e.g. ami-0abcdef1234567890)
    ConstraintDescription: Must be a valid AMI ID (ami-xxxxxxxxxxxxxxxxx)

  ClusterSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Select SecurityGroup for Compute Node Group for Cluster Communication

  IamProfileArn:
    Type: String
    Description: IAM Instance Profile for Compute Node Group

  FSxLustreFilesystemId:
    Type: String
    Description: Filesystem ID for FSx for Lustre

  FSxLustreFilesystemMountName:
    Type: String
    Description: MountName for FSx for Lustre

  FSxOpenZFSFilesystemId:
    Type: String
    Description: Filesystem ID for FSx for OpenZFS

Conditions:
  Use32Interfaces:
    Fn::Equals:
      - Ref: NetworkInterfaceCount
      - "32"
  UseCapacityBlock: !Not [!Equals [!Ref CapacityReservationId, ""]]
  UseOnDemand: !Equals [!Ref CapacityReservationId, ""]
  CreateQueue: !Not [!Equals [!Ref QueueName, ""]]

Resources:

  # Cluster Placement Group (On-Demand only)
  PlacementGroup:
    Type: AWS::EC2::PlacementGroup
    Condition: UseOnDemand
    Properties:
      Strategy: cluster

  # Compute Node groups - Compute Nodes
  PCSNodeGroupCompute:
    Type: AWS::PCS::ComputeNodeGroup
    Properties:
      ClusterId: !Ref ClusterId
      Name: !Ref CngName
      ScalingConfiguration:
        MinInstanceCount: !Ref MinCount
        MaxInstanceCount: !Ref MaxCount
      IamInstanceProfileArn: !Ref IamProfileArn
      CustomLaunchTemplate:
        TemplateId: !Ref PCSLaunchTemplate
        Version: 1
      SubnetIds:
        - !Ref SubnetId
      AmiId: !Ref AmiId
      InstanceConfigs:
        - InstanceType: !Ref InstanceType
      PurchaseOption: !If [UseCapacityBlock, CAPACITY_BLOCK, !Ref "AWS::NoValue"]

  PCSQueueCompute:
    Type: AWS::PCS::Queue
    Condition: CreateQueue
    Properties:
      ClusterId: !Ref ClusterId
      Name: !Ref QueueName
      ComputeNodeGroupConfigurations:
        - ComputeNodeGroupId: !GetAtt [PCSNodeGroupCompute, Id]

  PCSLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub 'PCS-lt-${AWS::StackName}'

      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        InstanceMarketOptions: !If
          - UseCapacityBlock
          - MarketType: capacity-block
          - !Ref AWS::NoValue
        CapacityReservationSpecification: !If
          - UseCapacityBlock
          - CapacityReservationTarget:
              CapacityReservationId: !Ref CapacityReservationId
          - !Ref AWS::NoValue
        Placement: !If
          - UseOnDemand
          - GroupName: !Ref PlacementGroup
          - !Ref AWS::NoValue
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: HPCRecipes
                Value: "true"
              - Key: Name
                Value: !Sub 'PCS-${CngName}'
        MetadataOptions:
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 4
          HttpTokens: required
        UserData:
          Fn::Base64: !Sub |
            MIME-Version: 1.0
            Content-Type: multipart/mixed; boundary="==MYBOUNDARY=="

            --==MYBOUNDARY==
            Content-Type: text/cloud-config; charset="us-ascii"
            MIME-Version: 1.0

            runcmd:
            - mkdir -p /tmp/home
            - rsync -aA /home/ /tmp/home
            - echo "${FSxOpenZFSFilesystemId}.fsx.${AWS::Region}.amazonaws.com:/fsx/ /home nfs noatime,nfsvers=3,sync,nconnect=16,rsize=1048576,wsize=1048576,defaults 0 0" >> /etc/fstab
            - mount -a -t nfs defaults
            - if [ "enabled" == "$(sestatus | awk '/^SELinux status:/{print $3}')" ]; then setsebool -P use_nfs_home_dirs 1; fi
            - rsync -aA --ignore-existing /tmp/home/ /home
            - rm -rf /tmp/home/
            # If provided, mount FSxL filesystem as /fsx
            - if [ ! -z "${FSxLustreFilesystemId}" ]; then mkdir -p /fsx; mount -t lustre ${FSxLustreFilesystemId}.fsx.${AWS::Region}.amazonaws.com@tcp:/${FSxLustreFilesystemMountName} /fsx; chmod 1777 /fsx; fi

            --==MYBOUNDARY==
        NetworkInterfaces:
          # Primary network interface (NetworkCardIndex 0)
          - Description: Primary network interface
            DeviceIndex: 0
            InterfaceType: efa
            NetworkCardIndex: 0
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          # EFA network interfaces 1-31 (all use DeviceIndex 1)
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 1
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 2
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 3
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 4
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 5
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 6
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 7
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 8
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 9
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 10
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 11
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 12
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 13
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 14
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - DeviceIndex: 1
            InterfaceType: efa
            NetworkCardIndex: 15
            SubnetId: !Ref SubnetId
            Groups:
            - !Ref ClusterSecurityGroupId
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 16
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 17
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 18
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 19
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 20
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 21
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 22
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 23
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 24
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 25
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 26
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 27
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 28
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 29
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 30
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue
          - Fn::If:
            - Use32Interfaces
            - DeviceIndex: 1
              InterfaceType: efa
              NetworkCardIndex: 31
              SubnetId: !Ref SubnetId
              Groups:
              - !Ref ClusterSecurityGroupId
            - !Ref AWS::NoValue

Outputs:
  NodeGroupId:
    Description: Compute Node Group ID
    Value: !GetAtt PCSNodeGroupCompute.Id
  QueueId:
    Condition: CreateQueue
    Description: Queue ID
    Value: !GetAtt PCSQueueCompute.Id
  LaunchTemplateId:
    Description: Launch template Id
    Value: !Ref PCSLaunchTemplate
  DefaultVersionNumber:
    Description: Default version number
    Value: !GetAtt PCSLaunchTemplate.DefaultVersionNumber
  LatestVersionNumber:
    Description: Latest version number
    Value: !GetAtt PCSLaunchTemplate.DefaultVersionNumber
